<!DOCTYPE html>
<html>
<head>
<title>Age Check</title>

<script>
function validate() {
    let age = document.getElementById("age").value;
    if (age < 18) {
        alert("You are a minor");
    } else {
        alert("You are an adult");
    }
}
</script>
</head>
<body>
<input id="age" type="number" name="age">
<input type="submit" value="Submit" onclick="validate()">
</body>
</html>
